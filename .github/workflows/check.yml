name: Checks
on:
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Check lockfile consistency
        run: uv lock --check

      - name: Install dependencies
        run: uv sync

      - name: Ruff linting
        run: uv run ruff check .

      - name: Black formatting check
        run: uv run black --check .

      - name: Pyright type checking
        run: uv run pyright

  commitizen:
    name: Commitizen Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install commitizen
        run: pip install commitizen

      - name: Commitizen check
        run: |
          BASE_REF="${GITHUB_BASE_REF:-develop}"
          if git rev-parse --verify "origin/${BASE_REF}" >/dev/null 2>&1; then
            cz -nr 3 check --rev-range "origin/${BASE_REF}..HEAD"
          else
            echo "Base branch origin/${BASE_REF} not found, skipping commitizen check"
          fi

  tests:
    name: Run Tests on ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest -v --cov --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: ./coverage.xml
          fail_ci_if_error: false
